<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Tork Moduler Yapı — EKAP kaynaklı müşteri ve ihale takip panosu"
    />
    <title>Tork Moduler — İhale &amp; Müşteri Özeti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <p class="site-header__eyebrow">Tork Moduler Yapı</p>
        <h1 class="site-header__title">İhale &amp; Müşteri Özeti</h1>
        <p class="site-header__lead">
          EKAP üzerinden takip edilen fırsatlar: ihale durumu, tarih, tedarik
          kapsamındaki ürünler ve muhtemel katılımcılar / kazanan firmalar tek
          ekranda.
        </p>
      </header>

      <main>
        <div
          id="filter-bar"
          class="filter-bar"
          role="tablist"
          aria-label="İhale durumuna göre filtrele"
        ></div>
        <div
          id="tender-list"
          class="tender-list"
          role="tabpanel"
          aria-live="polite"
        ></div>
      </main>
    </div>
    <div
      id="party-modal"
      class="party-modal"
      hidden
      aria-hidden="true"
    >
      <div class="party-modal__backdrop" data-close-modal tabindex="-1"></div>
      <div
        class="party-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="party-modal-title"
        tabindex="-1"
      >
        <button
          type="button"
          class="party-modal__close"
          data-close-modal
          aria-label="Kapat"
        >
          <span aria-hidden="true">×</span>
        </button>
        <p class="party-modal__context" id="party-modal-context"></p>
        <h2 class="party-modal__title" id="party-modal-title"></h2>
        <p class="party-modal__role" id="party-modal-role"></p>
        <div class="party-modal__body" id="party-modal-body"></div>
      </div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
