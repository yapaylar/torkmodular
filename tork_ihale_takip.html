<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TORK — İhale Takip Listesi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --tork-navy: #10263B;
  --tork-navy-deep: #0A1B2C;
  --tork-silver: #C8D0DC;
  --tork-silver-soft: #E8ECEF;
  --tork-gold: #B8924A;
  --tork-gold-light: #D4AF6A;
  --bg: #F4F6F9;
  --paper: #FFFFFF;
  --line: #D8DEE6;
  --line-soft: #ECEFF3;
  --ink: #10263B;
  --ink-soft: #5A6B7E;
  --ink-mute: #8896A6;
  --ankara-bg: #EAF0F8;
  --ankara-border: #B0C4E0;
  --kayseri-bg: #FBF1E2;
  --kayseri-border: #E8C97D;
  --green-bg: #E8F0EA;
  --green: #1A6B3D;
  --warn-bg: #FDF3E0;
  --warn: #B8924A;
  --urgent-bg: #FBE4E4;
  --urgent: #8B2E2E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  padding: 32px 16px;
  -webkit-font-smoothing: antialiased;
}

.paper {
  max-width: 1280px;
  margin: 0 auto;
  background: var(--paper);
  box-shadow: 0 1px 3px rgba(16,38,59,0.04), 0 12px 48px rgba(16,38,59,0.10);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.paper::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--tork-gold), var(--tork-gold-light), var(--tork-gold));
  z-index: 5;
}

/* HEADER */
.header { background: var(--tork-navy); color: white; }
.header-grid {
  display: grid;
  grid-template-columns: 200px 1fr auto;
  align-items: stretch;
}
.header-logo {
  background: var(--tork-navy-deep);
  padding: 32px 24px;
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid rgba(200,208,220,0.08);
  position: relative;
}
.header-logo::after {
  content: ''; position: absolute; top: 50%; right: 0;
  transform: translateY(-50%); width: 1px; height: 60%;
  background: linear-gradient(to bottom, transparent, var(--tork-gold) 50%, transparent);
}
.header-logo img { width: 100%; max-width: 140px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }
.header-title { padding: 32px 36px; display: flex; flex-direction: column; justify-content: center; }
.doc-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 600;
  color: var(--tork-silver-soft);
  letter-spacing: 0.5px; line-height: 1.1;
}

/* STATS */
.header-stats {
  display: flex; gap: 0;
  border-left: 1px solid rgba(200,208,220,0.08);
}
.stat {
  padding: 28px 28px;
  text-align: center;
  border-right: 1px solid rgba(200,208,220,0.06);
  min-width: 100px;
}
.stat:last-child { border-right: none; }
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 600;
  color: var(--tork-gold-light); line-height: 1;
}
.stat-lbl {
  font-size: 9px; font-weight: 600; letter-spacing: 2.5px;
  color: rgba(200,208,220,0.6); text-transform: uppercase; margin-top: 6px;
}

/* TOOLBAR */
.toolbar {
  padding: 18px 32px;
  background: var(--paper);
  border-bottom: 1px solid var(--line-soft);
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; max-width: 320px; }
.search-wrap input {
  width: 100%;
  border: 1px solid var(--line);
  padding: 9px 12px 9px 32px;
  font-family: 'Inter', sans-serif; font-size: 12px;
  outline: none; border-radius: 1px;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--tork-gold); }
.search-wrap::before {
  content: '⌕'; position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--ink-mute); font-size: 14px;
}

.filter-group { display: flex; gap: 6px; }
.f-btn {
  padding: 8px 14px; border: 1px solid var(--line);
  background: var(--paper); color: var(--ink-soft);
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: 1px; cursor: pointer; border-radius: 1px;
  transition: all 0.15s; text-transform: uppercase;
}
.f-btn:hover { border-color: var(--tork-navy); color: var(--tork-navy); }
.f-btn.active { background: var(--tork-navy); color: var(--tork-silver-soft); border-color: var(--tork-navy); }
.f-btn.ankara.active { background: var(--ankara-border); border-color: var(--ankara-border); color: var(--tork-navy); }
.f-btn.kayseri.active { background: var(--tork-gold); border-color: var(--tork-gold); color: white; }

.toolbar-spacer { flex: 1; }
.btn {
  padding: 9px 18px; font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer; border-radius: 1px;
  border: 1px solid; transition: all 0.2s;
}
.btn-primary { background: var(--tork-navy); color: var(--tork-silver-soft); border-color: var(--tork-navy); }
.btn-primary:hover { background: var(--tork-navy-deep); }
.btn-gold { background: var(--tork-gold); color: white; border-color: var(--tork-gold); }
.btn-gold:hover { background: var(--tork-gold-light); }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead tr { background: var(--tork-navy); position: sticky; top: 0; z-index: 2; }
thead th {
  padding: 14px 12px;
  color: var(--tork-silver-soft);
  font-family: 'Inter', sans-serif;
  font-size: 9px; font-weight: 600; letter-spacing: 2.5px;
  text-transform: uppercase; text-align: left; white-space: nowrap;
  border-bottom: 2px solid var(--tork-gold);
}
thead th.center { text-align: center; }
tbody tr {
  border-bottom: 1px solid var(--line-soft);
  transition: background 0.1s;
}
tbody tr.main-row { cursor: pointer; }
tbody tr.main-row:hover { background: var(--bg); }
tbody td { padding: 12px 12px; vertical-align: middle; }
tbody tr.ankara { background: var(--ankara-bg); }
tbody tr.kayseri { background: var(--kayseri-bg); }
tbody tr.pazarlik { background: var(--green-bg); }
tbody tr.urgent { background: var(--urgent-bg); }
tbody tr.warning { background: var(--warn-bg); }

/* DETAIL ROW */
tr.detail-row { display: none; }
tr.detail-row.open { display: table-row; }
tr.detail-row td {
  padding: 0; background: var(--bg);
  border-bottom: 1px solid var(--line);
  border-top: 1px solid var(--line);
}
.detail-content {
  padding: 24px 32px;
  display: grid;
  grid-template-columns: 1fr 1fr 320px;
  gap: 28px;
}
.detail-section h4 {
  font-size: 9px; font-weight: 600; letter-spacing: 2.5px;
  color: var(--tork-gold); text-transform: uppercase;
  margin-bottom: 14px; padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
}
.detail-grid { display: grid; gap: 12px 20px; }
.detail-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.detail-field { display: flex; flex-direction: column; gap: 4px; }
.detail-field label {
  font-size: 8.5px; font-weight: 600; letter-spacing: 2px;
  color: var(--ink-mute); text-transform: uppercase;
}
.detail-field input, .detail-field select, .detail-field textarea {
  border: none; border-bottom: 1px solid var(--line);
  padding: 4px 0 6px;
  font-family: 'Inter', sans-serif; font-size: 12px;
  color: var(--ink); background: transparent; outline: none;
}
.detail-field input:focus, .detail-field select:focus, .detail-field textarea:focus {
  border-bottom-color: var(--tork-gold);
}
.detail-field textarea {
  border: 1px solid var(--line); padding: 8px 10px;
  resize: vertical; min-height: 60px; line-height: 1.5;
}

/* CHECKLIST */
.checklist {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px;
}
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--line-soft);
  font-size: 11.5px;
  cursor: pointer;
}
.check-item:last-child { border-bottom: none; }
.check-item input[type=checkbox] {
  width: 14px; height: 14px;
  accent-color: var(--tork-gold); cursor: pointer;
}
.check-item label { cursor: pointer; flex: 1; color: var(--ink-soft); }
.check-item input:checked + label {
  color: var(--green); text-decoration: line-through;
}
.check-progress {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
}
.progress-bar {
  flex: 1; height: 4px;
  background: var(--line); border-radius: 2px; margin: 0 12px;
  overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--tork-gold);
  transition: width 0.3s;
}
.progress-txt { font-size: 10px; color: var(--ink-soft); font-weight: 600; }

/* CHIPS / BADGES */
.badge {
  display: inline-block; padding: 3px 8px;
  font-size: 9.5px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; border-radius: 1px;
  white-space: nowrap;
}
.b-acik { background: var(--tork-navy); color: var(--tork-silver-soft); }
.b-pazarlik { background: var(--green); color: white; }
.b-yapim { background: var(--ink-soft); color: white; }
.b-mal { background: #6B5B8E; color: white; }
.b-hizmet { background: #4A7B8A; color: white; }
.b-ankara { background: var(--ankara-border); color: var(--tork-navy); }
.b-kayseri { background: var(--tork-gold); color: white; }

.kurum-tag {
  display: inline-block; padding: 2px 8px;
  background: rgba(16,38,59,0.06); color: var(--ink-soft);
  font-size: 10px; font-weight: 500;
  border-radius: 1px; margin-right: 4px;
}

/* DURUM SELECT */
.durum-select {
  border: 1px solid var(--line); padding: 5px 8px;
  font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 600;
  background: var(--paper); cursor: pointer; outline: none;
  border-radius: 1px; color: var(--ink);
  transition: all 0.2s;
}
.durum-select:focus { border-color: var(--tork-gold); }

/* DURUM RENKLERİ */
.durum-select.takipte,
.durum-select.dokuman {
  background: #F4F6F9; color: var(--ink-soft);
  border-color: var(--line);
}
.durum-select.teklif-hazir {
  background: #FDF3E0; color: #8B6914;
  border-color: #E8C97D;
}
.durum-select.teklif-verildi {
  background: #E4ECF7; color: #1F4A8B;
  border-color: #B0C4E8;
}
.durum-select.kazanildi {
  background: #D9EDDF; color: #0A4D33;
  border-color: #1A6B3D;
}
.durum-select.kaybedildi,
.durum-select.iptal {
  background: #FBE4E4; color: #8B2E2E;
  border-color: #D88B8B;
}

/* COUNTDOWN */
.countdown {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 500;
}
.countdown.urgent { color: var(--urgent); font-weight: 700; }
.countdown.warning { color: var(--warn); font-weight: 600; }
.countdown.normal { color: var(--ink-soft); }

/* STAR */
.star-btn {
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--line); padding: 0;
  transition: color 0.15s, transform 0.15s;
}
.star-btn.starred { color: var(--tork-gold-light); }
.star-btn:hover { transform: scale(1.2); }

/* EXPAND ICON */
.expand-btn {
  background: none; border: none; cursor: pointer;
  color: var(--ink-mute); font-size: 12px; padding: 4px 6px;
  transition: transform 0.2s;
}
.expand-btn.open { transform: rotate(90deg); color: var(--tork-gold); }

/* SECTION DIVIDERS */
.section-divider td {
  background: var(--tork-navy-deep);
  color: var(--tork-gold-light);
  font-family: 'Inter', sans-serif;
  font-size: 9.5px; font-weight: 600; letter-spacing: 3px;
  padding: 8px 16px;
  text-transform: uppercase;
  border-top: 1px solid var(--tork-gold);
}

/* ADD FORM */
.add-form {
  display: none;
  padding: 24px 32px;
  background: #FBF8F1;
  border-top: 2px solid var(--tork-gold);
}
.add-form.show { display: block; }
.add-form-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; color: var(--tork-navy);
  margin-bottom: 18px;
}
.add-grid {
  display: grid;
  grid-template-columns: 130px 180px 1fr 130px 130px;
  gap: 12px; margin-bottom: 12px;
}
.add-grid input, .add-grid select {
  border: 1px solid var(--line); padding: 8px 10px;
  font-family: 'Inter', sans-serif; font-size: 12px;
  outline: none; border-radius: 1px;
}
.add-grid input:focus, .add-grid select:focus { border-color: var(--tork-gold); }
.add-grid-2 {
  display: grid;
  grid-template-columns: 240px 240px 1fr;
  gap: 12px; margin-bottom: 14px;
}
.add-grid-2 input, .add-grid-2 select {
  border: 1px solid var(--line); padding: 8px 10px;
  font-family: 'Inter', sans-serif; font-size: 12px;
  outline: none; border-radius: 1px;
}
.add-actions { display: flex; gap: 8px; }

/* FOOTER */
.footer {
  background: var(--tork-navy);
  color: rgba(200,208,220,0.6);
  padding: 18px 36px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; letter-spacing: 1px;
}
.footer .gold { color: var(--tork-gold-light); font-weight: 500; }
.footer .silver { color: var(--tork-silver); }

@media print {
  body { background: white; padding: 0; }
  .paper { box-shadow: none; max-width: 100%; }
  .toolbar, .add-form, .star-btn, .expand-btn { display: none !important; }
  thead tr { position: static; }
}
</style>
</head>

let filterMode = null;
let openRow = null;

function parseDate(s) {
  const [d,m,y] = s.split('.');
  return new Date(`${y}-${m}-${d}`);
}
function daysUntil(s) {
  const d = parseDate(s);
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((d - today) / (1000*60*60*24));
}
function formatBedel(b) {
  if (!b) return '';
  const n = parseInt(b.replace(/\D/g,''));
  if (!n) return b;
  return n.toLocaleString('tr-TR') + ' ₺';
}

function durumClass(durum) {
  const map = {
    'Takipte': 'takipte',
    'Doküman Alındı': 'dokuman',
    'Teklif Hazır': 'teklif-hazir',
    'Teklif Verildi': 'teklif-verildi',
    'Kazanıldı': 'kazanildi',
    'Kaybedildi': 'kaybedildi',
    'İptal': 'iptal'
  };
  return map[durum] || 'takipte';
}

function render() {
  const tbody = document.getElementById('tbody');
  const search = document.getElementById('search').value.toLowerCase();
  tbody.innerHTML = '';
  let count=0, ankaraC=0, kayseriC=0, urgentC=0;
  let lastMonth = '';

  ihaleler.forEach((d, i) => {
    if (search && !d.kent.toLowerCase().includes(search) && !d.is.toLowerCase().includes(search) && !(d.kurum||'').toLowerCase().includes(search)) return;
    if (filterMode === 'ankara' && !d.kent.includes('Ankara')) return;
    if (filterMode === 'kayseri' && !d.kent.includes('Kayseri')) return;
    const days = daysUntil(d.tarih);
    if (filterMode === 'yakin' && days > 7) return;

    count++;
    if (d.kent.includes('Ankara')) ankaraC++;
    if (d.kent.includes('Kayseri')) kayseriC++;
    if (days <= 7 && days >= 0) urgentC++;

    // month divider
    const monthKey = d.tarih.split('.').slice(1).join('.');
    const monthName = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'][parseInt(d.tarih.split('.')[1])];
    if (monthKey !== lastMonth) {
      lastMonth = monthKey;
      const divTr = document.createElement('tr');
      divTr.className = 'section-divider';
      divTr.innerHTML = `<td colspan="11">${monthName} ${d.tarih.split('.')[2]}</td>`;
      tbody.appendChild(divTr);
    }

    let rowClass = '';
    if (d.kent.includes('Ankara')) rowClass = 'ankara';
    else if (d.kent.includes('Kayseri')) rowClass = 'kayseri';
    else if (d.usul === 'Pazarlık Usulü') rowClass = 'pazarlik';
    if (days >= 0 && days <= 3) rowClass += ' urgent';
    else if (days > 3 && days <= 7) rowClass += ' warning';

    let countdownClass = 'normal', countdownText;
    if (days < 0) { countdownText = `${Math.abs(days)} gün geçti`; countdownClass = 'urgent'; }
    else if (days === 0) { countdownText = 'BUGÜN'; countdownClass = 'urgent'; }
    else if (days <= 3) { countdownText = `${days} gün kaldı`; countdownClass = 'urgent'; }
    else if (days <= 7) { countdownText = `${days} gün`; countdownClass = 'warning'; }
    else { countdownText = `${days} gün`; countdownClass = 'normal'; }

    const checkDone = (d.checklist || []).filter(x => x).length;
    const checkTotal = standardChecklist.length;
    const checkPct = Math.round((checkDone / checkTotal) * 100);

    const turBadge = d.tur === 'Yapım' ? 'b-yapim' : (d.tur === 'Mal' ? 'b-mal' : 'b-hizmet');
    const usulBadge = d.usul === 'Pazarlık Usulü' ? 'b-pazarlik' : 'b-acik';

    // Main row
    const tr = document.createElement('tr');
    tr.className = 'main-row ' + rowClass;
    tr.innerHTML = `
      <td class="center"><button class="star-btn ${d.star?'starred':''}" onclick="event.stopPropagation();toggleStar(${i})">${d.star?'★':'☆'}</button></td>
      <td><button class="expand-btn ${openRow===i?'open':''}" onclick="event.stopPropagation();toggleDetail(${i})">▶</button></td>
      <td><div style="font-weight:500">${d.tarih}</div>${d.saat?`<div style="font-size:10px;color:var(--ink-mute)">${d.saat}</div>`:''}</td>
      <td><span class="countdown ${countdownClass}">${countdownText}</span></td>
      <td>${d.kent}</td>
      <td><span class="kurum-tag">${d.kurum||'—'}</span></td>
      <td style="font-size:12px;line-height:1.4">${d.is}</td>
      <td><span class="badge ${turBadge}">${d.tur}</span></td>
      <td><span class="badge ${usulBadge}">${d.usul}</span></td>
      <td>
        <select class="durum-select ${durumClass(d.durum)}" onclick="event.stopPropagation()" onchange="updateField(${i},'durum',this.value); render();">
          ${['Takipte','Doküman Alındı','Teklif Hazır','Teklif Verildi','Kazanıldı','Kaybedildi','İptal'].map(s => `<option ${d.durum===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td class="center" style="font-size:10px;color:var(--ink-soft);font-weight:600">${checkDone}/${checkTotal}</td>
    `;
    tr.onclick = () => toggleDetail(i);
    tbody.appendChild(tr);

    // Detail row
    const detailTr = document.createElement('tr');
    detailTr.className = 'detail-row ' + (openRow === i ? 'open' : '');
    detailTr.id = `detail-${i}`;
    detailTr.innerHTML = `
      <td colspan="11">
        <div class="detail-content">
          <div class="detail-section">
            <h4>İhale Bilgileri</h4>
            <div class="detail-grid cols-2">
              <div class="detail-field">
                <label>EKAP İhale Kayıt No</label>
                <input type="text" value="${d.ekap}" placeholder="2026/000000" onchange="updateField(${i},'ekap',this.value)">
              </div>
              <div class="detail-field">
                <label>İhale Saati</label>
                <input type="time" value="${d.saat}" onchange="updateField(${i},'saat',this.value)">
              </div>
              <div class="detail-field">
                <label>Tahmini Bedel</label>
                <input type="text" value="${d.bedel}" placeholder="₺" onchange="updateField(${i},'bedel',this.value)">
              </div>
              <div class="detail-field">
                <label>Geçici Teminat</label>
                <input type="text" value="${d.teminat}" placeholder="₺" onchange="updateField(${i},'teminat',this.value)">
              </div>
              <div class="detail-field">
                <label>Sorumlu Personel</label>
                <input type="text" value="${d.sorumlu}" placeholder="Personel adı" onchange="updateField(${i},'sorumlu',this.value)">
              </div>
              <div class="detail-field">
                <label>İhale Sahibi Kurum</label>
                <input type="text" value="${d.kurum||''}" onchange="updateField(${i},'kurum',this.value)">
              </div>
              <div class="detail-field" style="grid-column:span 2">
                <label>Notlar</label>
                <textarea onchange="updateField(${i},'not',this.value)" placeholder="Önemli notlar, hatırlatmalar...">${d.not||''}</textarea>
              </div>
            </div>
          </div>

          <div class="detail-section">
            <h4>İş Detayı</h4>
            <div class="detail-field">
              <label>Yapılacak İş</label>
              <textarea onchange="updateField(${i},'is',this.value)" style="min-height:80px">${d.is}</textarea>
            </div>
            <div class="detail-grid cols-2" style="margin-top:14px">
              <div class="detail-field">
                <label>İhale Türü</label>
                <select onchange="updateField(${i},'tur',this.value)">
                  ${['Yapım','Mal','Hizmet'].map(s => `<option ${d.tur===s?'selected':''}>${s}</option>`).join('')}
                </select>
              </div>
              <div class="detail-field">
                <label>İhale Usulü</label>
                <select onchange="updateField(${i},'usul',this.value)">
                  ${['Açık Usul','Pazarlık Usulü','Belli İstekliler Arası'].map(s => `<option ${d.usul===s?'selected':''}>${s}</option>`).join('')}
                </select>
              </div>
            </div>
          </div>

          <div class="detail-section">
            <h4>Belge Kontrol</h4>
            <div class="checklist">
              ${standardChecklist.map((item, ci) => `
                <div class="check-item">
                  <input type="checkbox" id="ck-${i}-${ci}" ${(d.checklist||[])[ci]?'checked':''} onchange="toggleCheck(${i},${ci})">
                  <label for="ck-${i}-${ci}">${item}</label>
                </div>
              `).join('')}
              <div class="check-progress">
                <span class="progress-txt">${checkDone}/${checkTotal}</span>
                <div class="progress-bar"><div class="progress-fill" style="width:${checkPct}%"></div></div>
                <span class="progress-txt">${checkPct}%</span>
              </div>
            </div>
          </div>
        </div>
      </td>
    `;
    tbody.appendChild(detailTr);
  });

  document.getElementById('s-total').textContent = count;
  document.getElementById('s-ankara').textContent = ankaraC;
  document.getElementById('s-kayseri').textContent = kayseriC;
  document.getElementById('s-urgent').textContent = urgentC;
}

function toggleDetail(i) {
  openRow = (openRow === i) ? null : i;
  render();
}
function toggleStar(i) { ihaleler[i].star = !ihaleler[i].star; render(); }
function updateField(i, field, val) { ihaleler[i][field] = val; }
function toggleCheck(i, ci) {
  ihaleler[i].checklist = ihaleler[i].checklist || [];
  ihaleler[i].checklist[ci] = !ihaleler[i].checklist[ci];
  render();
}
function setFilter(mode) {
  filterMode = filterMode === mode ? null : mode;
  ['ankara','kayseri','yakin'].forEach(m => {
    const el = document.getElementById('f-'+m);
    if (el) el.classList.toggle('active', filterMode === m);
  });
  render();
}
function toggleAdd() {
  document.getElementById('add-form').classList.toggle('show');
  document.getElementById('n-tarih').valueAsDate = new Date();
}
function addNew() {
  const t = document.getElementById('n-tarih').value;
  const kent = document.getElementById('n-kent').value.trim();
  const is = document.getElementById('n-is').value.trim();
  if (!kent || !is) { alert('Kent ve iş alanları zorunludur'); return; }
  const d = new Date(t);
  const tarih = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
  ihaleler.push({
    tarih, kent, is,
    tur: document.getElementById('n-tur').value,
    usul: document.getElementById('n-usul').value,
    kurum: document.getElementById('n-kurum').value,
    ekap: document.getElementById('n-ekap').value,
    bedel: document.getElementById('n-bedel').value,
    durum: 'Takipte', not: '', star: false, teminat: '', sorumlu: '', saat: '', checklist: []
  });
  ihaleler.sort((a,b) => parseDate(a.tarih) - parseDate(b.tarih));
  ['n-kent','n-is','n-kurum','n-ekap','n-bedel'].forEach(id => document.getElementById(id).value = '');
  toggleAdd();
  render();
}

// LOCALSTORAGE
function saveIhale() {
  try { localStorage.setItem('tork_ihaleler', JSON.stringify(ihaleler)); } catch(e) {}
}
function loadIhale() {
  try {
    const s = localStorage.getItem('tork_ihaleler');
    if (s) { const p = JSON.parse(s); if (p && p.length) ihaleler = p; }
  } catch(e) {}
}

    durum: 'Takipte', not: '', star: false, teminat: '', sorumlu: '', saat: '', checklist: []
  });
  ihaleler.sort((a,b) => parseDate(a.tarih) - parseDate(b.tarih));
  ['n-kent','n-is','n-kurum','n-ekap','n-bedel'].forEach(id => document.getElementById(id).value = '');
  toggleAdd();
  saveIhale();
  render();
};

// updateField wrap
const _updateField = updateField;
updateField = function(i, field, val) {
  _updateField(i, field, val);
  saveIhale();
};

// toggleCheck wrap
const _toggleCheck = toggleCheck;
toggleCheck = function(i, ci) {
  ihaleler[i].checklist = ihaleler[i].checklist || [];
  ihaleler[i].checklist[ci] = !ihaleler[i].checklist[ci];
  saveIhale();
  render();
};

function exportIhale() {
  const json = JSON.stringify(ihaleler, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `tork_ihaleler_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
}

function importIhale(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!Array.isArray(parsed)) { alert('Geçersiz dosya'); return; }
      if (!confirm(`${parsed.length} ihale yüklenecek. Mevcut veriler silinecek. Devam?`)) return;
      ihaleler = parsed;
      saveIhale();
      ihaleler.sort((a,b) => parseDate(a.tarih) - parseDate(b.tarih));
      render();
      alert('✓ Veriler başarıyla yüklendi!');
    } catch(err) { alert('Dosya okunamadı: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

loadIhale();
ihaleler.sort((a,b) => parseDate(a.tarih) - parseDate(b.tarih));
render();
</script>
</body>
</html>
